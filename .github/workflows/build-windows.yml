name: Build Windows x64

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Vue frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install ffmpeg via Chocolatey
        shell: powershell
        run: choco install ffmpeg -y

      - name: Copy ffmpeg.exe to project root
        shell: powershell
        run: |
          $src = (Get-Command ffmpeg).Path
          Copy-Item $src -Destination "ffmpeg.exe"
          Write-Host "Bundling ffmpeg from: $src"

      - name: Install Python dependencies
        run: pip install -e ".[desktop]" cryptography pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Package as zip
        shell: powershell
        run: Compress-Archive -Path "dist\NCM音乐转码\*" -DestinationPath "NCM音乐转码-win64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NCM音乐转码-win64
          path: NCM音乐转码-win64.zip
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NCM音乐转码-win64.zip
          generate_release_notes: true
